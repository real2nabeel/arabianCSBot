services:
  bot:
    build: .
    image: arabian-cs-bot
    container_name: arabian-cs-bot
    restart: unless-stopped
    # All configuration is env-only (see utils/constants.py). Copy .env.example
    # to .env and fill it in before starting.
    env_file: .env
    # Reach a MySQL running on the Docker host (not in a container) by setting
    # DB_HOST=host.docker.internal in .env. Native on Docker Desktop; on Linux
    # this mapping makes the same hostname work.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional MySQL for local development, off by default:
  #   docker compose --profile local-db up -d
  # With it running, set DB_HOST=mysql and DB_PORT=3306 in .env. The bot's own
  # schema (DB_NAME_BOT) is auto-created on startup; the game ranking schemas
  # must be imported yourself, e.g.:
  #   docker compose exec -T mysql mysql -uroot -p"$DB_PASSWORD" rankTest < ddls.sql
  mysql:
    image: mysql:8.0
    container_name: arabian-cs-mysql
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_DATABASE: ${DB_NAME_BOT:-arabianbot}
    ports:
      # Host-side port for GUI/CLI tools only — the bot reaches MySQL on the
      # compose network at mysql:3306. Override if 3306 is already taken.
      - "127.0.0.1:${LOCAL_DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # $$ escapes Compose interpolation so the shell inside the container
      # expands the variable instead.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
